version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# Configuration commune Airflow (réutilisée via YAML anchors)
# ─────────────────────────────────────────────────────────────────────────────
x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment:
    &airflow-env
    # Airflow core
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: "afrihealth_secret_change_in_prod"

    # Connexion à la base Airflow (métadonnées)
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
      postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres:5432/airflow

    # Dépendances supplémentaires installées au démarrage
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      requests==2.31.0 psycopg2-binary==2.9.9 python-dotenv==1.0.0

    # Variables pipeline (transmises aux DAGs)
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_NAME: ${DB_NAME}
    DB_USER: ${DB_USER}
    DB_PASSWORD: ${DB_PASSWORD}

    # Permet d'importer le package pipeline/ depuis les DAGs
    PYTHONPATH: /opt/airflow

  volumes:
    - ./dags:/opt/airflow/dags
    - ./pipeline:/opt/airflow/pipeline
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy


# ─────────────────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── Base de données ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: afrihealth_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 00_ en premier → crée la DB airflow
      - ./scripts/create_airflow_db.sh:/docker-entrypoint-initdb.d/00_create_airflow_db.sh
      # 01_ en second → crée les schémas pipeline
      - ./init.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Initialisation Airflow (one-shot) ────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: afrihealth_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
        echo "Airflow initialisé."
    restart: "no"

  # ── Airflow Webserver ────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: afrihealth_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Airflow Scheduler ────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: afrihealth_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── API FastAPI ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: afrihealth_api
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped


# ─────────────────────────────────────────────────────────────────────────────
# Volumes persistants
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  airflow_logs:
